<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - HRMS</title>
    <script src="{{ url_for('static', filename='js/tailwindcss.js') }}"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <!-- Background Decoration -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-indigo-100 rounded-full blur-3xl opacity-40">
        </div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] bg-blue-100 rounded-full blur-3xl opacity-40"></div>
    </div>

    <div class="text-center mb-10 animate-fade-in-down">
        <h1 class="text-5xl font-extrabold text-slate-900 tracking-tight mb-2">HRMS</h1>
        <p class="text-slate-500 text-lg">Human Resource Management System</p>
    </div>

    <div
        class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 p-8 transform transition-all hover:scale-[1.01] duration-300">
        <h2 class="text-center text-sm font-medium text-slate-400 mb-8 uppercase tracking-widest">Select your login type
        </h2>

        <div class="space-y-4">
            <!-- Management Button -->
            <a href="{{ url_for('login', role='admin') }}"
                class="group relative flex items-center justify-center w-full bg-slate-900 text-white py-4 px-6 rounded-xl font-bold hover:bg-slate-800 transition-all duration-200 hover:shadow-lg">
                <span class="absolute left-6 text-slate-400 group-hover:text-white transition-colors">
                    <i class="fas fa-user-shield text-xl"></i>
                </span>
                <span>Management Login</span>
            </a>

            <!-- Lecturer Button -->
            <a href="{{ url_for('login', role='lecturer') }}"
                class="group relative flex items-center justify-center w-full bg-white text-slate-800 border-2 border-slate-200 py-4 px-6 rounded-xl font-bold hover:border-indigo-600 hover:text-indigo-700 transition-all duration-200 hover:shadow-md">
                <span class="absolute left-6 text-slate-400 group-hover:text-indigo-600 transition-colors">
                    <i class="fas fa-chalkboard-teacher text-xl"></i>
                </span>
                <span>Lecturer Login</span>
            </a>
        </div>
    </div>

</body>

</html>
